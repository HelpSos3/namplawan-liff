<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จดออเดอร์น้ำปลาหวาน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h2 class="text-2xl font-bold mb-4 text-center text-blue-600">📝 จดออเดอร์น้ำปลาหวาน</h2>
        
        <form id="orderForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">ชื่อลูกค้า</label>
                <input type="text" id="name" required class="mt-1 block w-full border border-gray-300 rounded-md p-3 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">เบอร์โทร</label>
                <input type="tel" id="phone" required class="mt-1 block w-full border border-gray-300 rounded-md p-3 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">ที่อยู่จัดส่ง / วันที่ส่ง</label>
                <textarea id="address" required rows="3" class="mt-1 block w-full border border-gray-300 rounded-md p-3 focus:ring-blue-500 focus:border-blue-500" placeholder="เช่น บ้านเลขที่... ส่งพรุ่งนี้เช้า"></textarea>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">ขนาดสินค้า</label>
                <select id="size" class="mt-1 block w-full border border-gray-300 rounded-md p-3 focus:ring-blue-500 focus:border-blue-500">
                    <option value="กระปุกเล็ก (60฿)" data-price="60">กระปุกเล็ก - 60 บาท</option>
                    <option value="กระปุกใหญ่ (100฿)" data-price="100">กระปุกใหญ่ - 100 บาท</option>
                    <option value="ชุดจัดเต็ม (150฿)" data-price="150">ชุดจัดเต็ม - 150 บาท</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">จำนวน (กระปุก)</label>
                <input type="number" id="quantity" min="1" required class="mt-1 block w-full border border-gray-300 rounded-md p-3 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-200">
                💾 บันทึกออเดอร์
            </button>
        </form>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwE8vriyD40fpe8ivS6bVpIToV7aOE8CCznURN-nmDCfWadSigAmzFFpfUZ1XEjW9U/exec";

        // ตัวแปรเช็คว่า LIFF พร้อมใช้งานหรือยัง
        let isLiffReady = false;

        async function main() {
            try {
                await liff.init({ liffId: "2010605232-NI0SvE5Q" }); 
                isLiffReady = true; // โหลดสำเร็จ
            } catch (err) {
                console.error("LIFF Init Error:", err);
            }
        }
        main();

        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = "⏳ กำลังบันทึกข้อมูล...";
            btn.disabled = true;
            btn.classList.replace('bg-blue-600', 'bg-gray-400');

            let recordedBy = "Admin";

            // แยกบล็อกดึงชื่อไลน์ออกมา ถ้าดึงในมือถือไม่ผ่าน จะได้ไม่พาให้สคริปต์ค้าง
            try {
                if(isLiffReady && liff.isLoggedIn()){
                    const profile = await liff.getProfile();
                    recordedBy = profile.displayName;
                }
            } catch (profileError) {
                console.warn("ดึงชื่อโปรไฟล์ไม่สำเร็จ ข้ามไปใช้ชื่อ Admin แทน");
            }

            const sizeSelect = document.getElementById('size');
            const selectedSizeText = sizeSelect.value;
            const pricePerUnit = parseInt(sizeSelect.options[sizeSelect.selectedIndex].getAttribute('data-price'));
            const qty = parseInt(document.getElementById('quantity').value);

            const payload = {
                customer_name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                size: selectedSizeText, 
                quantity: qty, 
                totalPrice: pricePerUnit * qty, 
                recorded_by: recordedBy
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8"
                    },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                if(result.status === "success") {
                    if(isLiffReady && liff.isInClient()) {
                        liff.closeWindow(); 
                    } else {
                        alert("บันทึกออเดอร์สำเร็จ! ยอดรวม " + payload.totalPrice + " บาท"); 
                        document.getElementById('orderForm').reset();
                    }
                }
            } catch (error) {
                // ถ้ามี Error จะแจ้งเตือนขึ้นมาบนจอเลย จะได้รู้ว่าติดที่เน็ตหรืออะไร
                alert("เกิดข้อผิดพลาด: " + error.message);
                console.error("Error Detail:", error);
            } finally {
                btn.innerText = "💾 บันทึกออเดอร์";
                btn.disabled = false;
                btn.classList.replace('bg-gray-400', 'bg-blue-600');
            }
        });
    </script>
</body>
</html>
