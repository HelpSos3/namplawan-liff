<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คิวจัดส่งน้ำปลาหวาน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto">
        <h2 class="text-2xl font-bold mb-4 text-center text-indigo-600">📦 คิวจัดส่งน้ำปลาหวาน</h2>
        
        <div id="orderContainer" class="space-y-4">
            <p class="text-center text-gray-500 mt-10">⏳ กำลังโหลดข้อมูลออเดอร์...</p>
        </div>
    </div>

    <script>
        // 🚨 เอา Web App URL เดิมที่ลงท้ายด้วย /exec มาใส่ตรงนี้
        const API_URL = "https://script.google.com/macros/s/AKfycbxKIfW-3w7QqSIbMKfUJj2wkqizQnKhXDiaNGQfMzc/exec";

        async function initApp() {
            try {
                // 🚨 สร้าง LIFF ใหม่ใน LINE Developers แล้วเอา ID มาใส่ตรงนี้นะครับ
                await liff.init({ liffId: "2010605232-rl5hovOp" });
                loadOrders(); // พอ LIFF พร้อม ก็สั่งโหลดข้อมูลออเดอร์เลย
            } catch (err) {
                console.error("LIFF Error:", err);
                loadOrders(); // ถ้าเปิดในคอมไม่ได้ใช้ LINE ก็ให้โหลดออเดอร์ได้เหมือนกัน
            }
        }

        async function loadOrders() {
            const container = document.getElementById('orderContainer');
            try {
                // ยิง GET ไปดึงข้อมูล
                const response = await fetch(API_URL);
                const orders = await response.json();
                
                container.innerHTML = ""; // ล้างข้อความกำลังโหลดออก

                if (orders.length === 0) {
                    container.innerHTML = `<p class="text-center text-green-600 font-bold mt-10">🎉 ไม่มีออเดอร์ค้างส่ง เยี่ยมมาก!</p>`;
                    return;
                }

                // สร้างการ์ดทีละใบตามจำนวนออเดอร์ที่มี
                orders.forEach(order => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded-xl shadow-md border-l-4 border-yellow-400";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg text-gray-800">👤 ${order.name}</h3>
                            <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded">${order.date}</span>
                        </div>
                        <p class="text-sm text-gray-600 mb-1">📞 ${order.phone}</p>
                        <p class="text-sm text-gray-600 mb-2">📍 ${order.address}</p>
                        <div class="bg-blue-50 p-2 rounded mb-3">
                            <p class="text-sm font-semibold text-blue-800">🛍️ ${order.details}</p>
                            <p class="text-sm font-bold text-blue-800 mt-1">ยอดรวม: ${order.total} บาท</p>
                        </div>
                        <button onclick="markAsDone(${order.row}, this)" class="w-full bg-green-500 text-white font-bold py-2 rounded-lg hover:bg-green-600 transition">
                            ✅ จัดส่งเรียบร้อยแล้ว
                        </button>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = `<p class="text-center text-red-500 mt-10">❌ ดึงข้อมูลล้มเหลว: ${error.message}</p>`;
            }
        }

        // ฟังก์ชันเมื่อกดปุ่ม "จัดส่งเรียบร้อยแล้ว"
        async function markAsDone(rowNumber, btnElement) {
            // เปลี่ยนหน้าตาปุ่มไม่ให้กดซ้ำ
            btnElement.innerText = "⏳ กำลังอัปเดต...";
            btnElement.disabled = true;
            btnElement.classList.replace('bg-green-500', 'bg-gray-400');

            const payload = {
                type: "update_status",
                row: rowNumber
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                if(result.status === "success") {
                    // ลบการ์ดใบนี้ออกจากหน้าจอแบบสมูทๆ
                    btnElement.parentElement.style.display = 'none';
                    alert("อัปเดตสถานะออเดอร์เป็น 'ส่งแล้ว' เรียบร้อยครับ!");
                }
            } catch (error) {
                alert("เกิดข้อผิดพลาด: " + error.message);
                btnElement.innerText = "✅ จัดส่งเรียบร้อยแล้ว";
                btnElement.disabled = false;
                btnElement.classList.replace('bg-gray-400', 'bg-green-500');
            }
        }

        initApp(); // สั่งให้โค้ดเริ่มทำงาน
    </script>
</body>
</html>
