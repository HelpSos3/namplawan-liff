<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จดรายจ่าย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6">
        <h2 class="text-2xl font-bold mb-4 text-center text-red-600">💸 จดค่าใช้จ่าย</h2>
        <form id="expenseForm" class="space-y-4">
            <input type="text" id="item_name" required placeholder="รายการวัตถุดิบ" class="w-full border p-3 rounded">
            <input type="number" id="amount" required placeholder="จำนวนเงิน" class="w-full border p-3 rounded">
            <button type="submit" id="btn" class="w-full bg-red-600 text-white font-bold py-3 rounded">💾 บันทึกรายจ่าย</button>
        </form>
    </div>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwE8vriyD40fpe8ivS6bVpIToV7aOE8CCznURN-nmDCfWadSigAmzFFpfUZ1XEjW9U/exec"; // 🚨 วาง URL ที่ได้จากขั้นตอนที่ 2
        liff.init({ liffId: "2010605232-U5r4dqbw" }); // ถ้าจะสร้าง LIFF ใหม่ก็ไปสร้างเพิ่มครับ

        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.innerText = "กำลังบันทึก...";
            
            const payload = {
                type: "expense",
                item_name: document.getElementById('item_name').value,
                amount: document.getElementById('amount').value
            };

            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("บันทึกเรียบร้อย!");
            liff.closeWindow();
        });
    </script>
</body>
</html>
